<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG LIVE - 영어 학습</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
  <!-- Top Navigation - Broadcast Bar -->
  <nav class="top-nav" aria-label="메인 네비게이션">
    <button class="nav-back" id="nav-back" onclick="history.back()" style="display:none;" aria-label="뒤로 가기">←</button>
    <span class="live-badge" aria-hidden="true">LIVE</span>
    <span class="nav-title" id="nav-title">ENG LIVE</span>
    <button class="nav-home" onclick="navigate('#home')" aria-label="홈으로 이동">🏠</button>
  </nav>

  <!-- Progress Bar -->
  <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="학습 진행률">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="main-content" aria-live="polite">
    <!-- Rendered by JS -->
  </main>
</div>

<script src="js/progress.js"></script>
<script src="js/app.js"></script>
<script src="js/livechat.js"></script>
<script src="js/vocab.js"></script>
<script src="js/reading.js"></script>
<script src="js/translation.js"></script>

</body>
</html>
