<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG LIVE - 영어 학습</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ENG LIVE">
<meta name="description" content="고등학교 영어 단어, 독해, 번역 학습 앱">
<link rel="stylesheet" href="css/style.css">
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6730377739026332" crossorigin="anonymous"></script>
</head>
<body>

<div class="app-container">
  <!-- Skip Navigation (접근성) -->
  <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>

  <!-- Top Navigation - Broadcast Bar -->
  <nav class="top-nav" aria-label="메인 네비게이션">
    <button class="nav-back" id="nav-back" onclick="history.back()" style="display:none;" aria-label="뒤로 가기">←</button>
    <span class="live-badge" aria-hidden="true">LIVE</span>
    <span class="nav-title" id="nav-title">ENG LIVE</span>
    <button class="nav-home" onclick="navigate('#home')" aria-label="홈으로 이동">🏠</button>
  </nav>

  <!-- Progress Bar -->
  <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="학습 진행률">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="main-content" aria-live="polite">
    <!-- Rendered by JS -->
  </main>
</div>

<script src="js/progress.js"></script>
<script src="js/app.js"></script>
<script src="js/livechat.js"></script>
<script src="js/vocab.js"></script>
<script src="js/reading.js"></script>
<script src="js/translation.js"></script>
<script>
// Service Worker 등록
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/eng-quiz/sw.js')
      .then(reg => console.log('SW 등록 완료:', reg.scope))
      .catch(err => console.warn('SW 등록 실패:', err));
  });
}
</script>

</body>
</html>
